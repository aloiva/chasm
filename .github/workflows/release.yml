name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'chasm ${{ github.ref_name }}'
          releaseBody: |
            ### Downloads
            - **Portable**: `chasm-portable.exe` — no install needed, just run it
            - **Installer**: `.exe` setup with Start Menu shortcut and uninstaller
            - **MSI**: for enterprise / GPO deployment
          releaseDraft: false
          prerelease: false

      - name: Upload portable exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          copy src-tauri\target\release\chasm.exe chasm-portable.exe
          gh release upload ${{ github.ref_name }} chasm-portable.exe --clobber
